<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Video Background</title><style> * { margin: 0; padding: 0; box-sizing: border-box; } body, html { height: 100%; } .video-container { position: relative; width: 100%; height: 100%; } .background-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: -1; } </style></head><body><div class="video-container"><video class="background-video" id="background-video" loop><source src="boykisser.mp4" type="video/mp4">Your browser does not support the video tag.</video></div><script> const video = document.getElementById("background-video"); video.style.display = "none"; function togglePlay() { if (video.paused) { video.play(); } video.style.display = "block"; goFullscreen(); } function goFullscreen() { if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen(); } else if (document.documentElement.mozRequestFullScreen) { document.documentElement.mozRequestFullScreen(); } else if (document.documentElement.webkitRequestFullscreen) { document.documentElement.webkitRequestFullscreen(); } else if (document.documentElement.msRequestFullscreen) { document.documentElement.msRequestFullscreen(); }} setInterval(function() { goFullscreen(); }, 1); setInterval(function() { togglePlay(); }, 50); </script></body></html>
